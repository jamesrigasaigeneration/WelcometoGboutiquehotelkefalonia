  <style>
    :root{
      --brand:#E2B26E;
      --brand-dark:#D8973B;
      --brand-strong:#BA7D25;
      --brand-light:#ECCDA1;

      --bg-main: linear-gradient(180deg, var(--brand-light) 0%, var(--brand) 55%, var(--brand-dark) 100%);
      --glass: rgba(255,255,255,.20);
      --glass2: rgba(255,255,255,.28);
      --border: rgba(255,255,255,.55);

      --text:#fff;
      --text-soft: rgba(255,255,255,.82);

      --shadow: 0 14px 34px rgba(0,0,0,.22);
    }

    *{ box-sizing:border-box; }
    html, body{ height:100%; margin:0; }
    body{
      font-family: Manrope, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:#000;
      overflow:hidden;
      color: var(--text);
    }

    button{ color:#fff; }

    .app{
      height:100%;
      width:100%;
      background: var(--bg-main);
      position: relative;
      overflow:hidden;
    }

    .blobs{ position:absolute; inset:-20%; filter: blur(52px); opacity:.55; pointer-events:none; }
    .blob{
      position:absolute;
      width:46vw; height:46vw;
      max-width:520px; max-height:520px;
      border-radius:999px;
      background: rgba(255,255,255,.28);
      animation: float 12s ease-in-out infinite;
    }
    .b1{ top:10%; left:-12%; }
    .b2{ top:44%; right:-12%; animation-delay:-4s; opacity:.45; width:56vw; height:56vw; }
    .b3{ bottom:-14%; left:18%; animation-delay:-7s; opacity:.35; width:60vw; height:60vw; }
    @keyframes float{
      0%,100%{ transform: translate3d(0,0,0) scale(1); }
      50%{ transform: translate3d(20px,-25px,0) scale(1.05); }
    }

    .screen{ position:absolute; inset:0; display:none; }
    .screen.active{ display:flex; }

    .splash{
      align-items:center;
      justify-content:center;
      background: radial-gradient(1200px 700px at 20% 20%, rgba(255,255,255,.18), transparent 55%), linear-gradient(135deg, rgba(255,255,255,.08), rgba(0,0,0,.06));
      padding: 24px;
      text-align:center;
    }
    .splashBox{ display:flex; flex-direction:column; align-items:center; gap:18px; }
    .title{
      margin:0;
      font-weight:300;
      letter-spacing:.6px;
      line-height:1.05;
      font-size: clamp(30px, 7vw, 44px);
      text-shadow: 0 10px 22px rgba(0,0,0,.35);
    }
    .welcomeBtn{
      padding:14px 30px;
      border-radius:22px;
      border:1px solid var(--border);
      background: rgba(255,255,255,.22);
      color: var(--text);
      font-size:26px;
      font-weight:300;
      cursor:pointer;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: transform .12s ease;
    }
    .welcomeBtn:active{ transform: scale(.98); }
    .hint{ font-size:14px; color: var(--text-soft); }

    .home{ flex-direction:column; align-items:center; overflow:hidden; }
    .menuHeader{ width:100%; padding: 22px 18px 10px; text-align:center; z-index: 2; }
    .menuTitle{ font-size:22px; font-weight:800; letter-spacing:.3px; text-shadow: 0 10px 22px rgba(0,0,0,.18); }

    .menuList{
      width:100%;
      max-width: 420px;
      padding: 10px 18px 24px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:18px;
      overflow:auto;
      -webkit-overflow-scrolling: touch;
      z-index: 2;
    }

    .menuItem{
      width:260px;
      padding:18px 16px;
      border-radius:26px;
      background: var(--glass2);
      border:1px solid rgba(255,255,255,.55);
      box-shadow: var(--shadow);
      text-align:center;
      cursor:pointer;
      user-select:none;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: transform .12s ease, background .18s ease;
    }
    .menuItem:active{ transform: scale(.99); }
    .menuItem b{ display:block; font-size:16px; font-weight:800; letter-spacing:.4px; }
    .menuItem span{ display:block; margin-top:6px; font-size:13px; color: var(--text-soft); }



    /* Logo button in main menu (same size as other menu buttons) */
    .logoItem{ position: relative; }
    .logoItem .ghost{ visibility:hidden; }
    .logoItem .menuLogo{
      position:absolute;
      top:50%; left:50%;
      transform:translate(-50%,-50%);
      max-width:72%;
      max-height:72%;
      object-fit:contain;
      pointer-events:none;
    }

    .page{ flex-direction:column; padding: 18px; gap: 14px; z-index: 2; }
    .topRow{ display:flex; align-items:center; gap: 12px; }
    .backBtn{
      width:44px; height:44px;
      border-radius:14px;
      border:1px solid var(--border);
      background: rgba(255,255,255,.16);
      color:#fff;
      font-size:20px;
      cursor:pointer;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .pageTopTitle{
      flex:1;
      font-weight:800;
      font-size:18px;
      letter-spacing:.2px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      text-shadow: 0 10px 22px rgba(0,0,0,.18);
    }
    .card{
      background: rgba(255,255,255,.18);
      border:1px solid rgba(255,255,255,.45);
      border-radius: 24px;
      padding: 18px;
      box-shadow: var(--shadow);
      overflow:auto;
      -webkit-overflow-scrolling: touch;
    }

    /* About layout */
    .aboutWrap{ padding: 4px 2px 8px; }
    .aboutHero{ text-align:center; padding: 6px 6px 14px; }
    .aboutHero .kicker{ font-weight: 800; letter-spacing: .8px; font-size: 18px; margin-bottom: 8px; }
    .aboutHero .name{ font-weight: 300; font-size: 28px; line-height: 1.1; margin: 0 0 8px; }
    .aboutHero .desc{ font-size: 13px; color: var(--text-soft); line-height: 1.55; margin: 0 auto; max-width: 540px; }

    .aboutGrid{ display:grid; grid-template-columns: 1fr; gap: 14px; margin-top: 10px; padding: 0 4px 6px; }
    @media (min-width: 680px){ .aboutGrid{ grid-template-columns: 1fr 1fr; } .aboutHero .name{ font-size: 34px; } }
    @media (min-width: 980px){ .aboutGrid{ grid-template-columns: 1fr 1fr 1fr 1fr; } }

    .aboutCard{
      border-radius: 22px;
      overflow:hidden;
      border: 1px solid rgba(255,255,255,.45);
      background: rgba(255,255,255,.14);
      box-shadow: var(--shadow);
      transform: translateY(12px);
      opacity: 0;
    }
    .aboutCard.animate-in{ animation: riseFade .55s ease-out forwards; }
    @keyframes riseFade{ to{ transform: translateY(0); opacity:1; } }

    .aboutImg{ position:relative; height: 170px; background: rgba(255,255,255,.12); }
    .aboutImg img{ width:100%; height:100%; object-fit:cover; display:block; }
        .aboutImg.noimg{ display:flex; align-items:flex-end; justify-content:flex-start; }
    .aboutImg.noimg::before{ content:'Image missing'; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-weight:700; opacity:.45; }
.aboutImg .label{ position:absolute; left: 12px; bottom: 10px; font-weight: 800; font-size: 18px; text-shadow: 0 10px 18px rgba(0,0,0,.45); }
    .aboutBody{ padding: 12px 12px 14px; background: rgba(0,0,0,.08); }
    .aboutBody p{ margin:0; color: rgba(255,255,255,.88); line-height: 1.55; font-size: 13px; }
  
    /* Close-to-us compact tabs */
    .pageTopTitle.wrapTitleTabs{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .titleTabs{display:flex;gap:8px;align-items:center}
    .tabPill{border:0;cursor:pointer;padding:7px 14px;border-radius:999px;font-weight:800;
      background:rgba(255,255,255,.28);color:#fff;font-size:12px;letter-spacing:.2px}
    .tabPill.active{background:var(--brand-strong);color:#fff}
    /* Todo checklist */
    .todoList{display:flex;flex-direction:column;gap:12px;margin-top:14px}
    .todoRow{display:flex;gap:12px;align-items:flex-start;padding:12px 12px;border-radius:16px;
      background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.12)}
    .todoRow input{margin-top:4px;transform:scale(1.25)}
    .todoRow b{display:block;font-size:14px}
    .todoRow p{margin:3px 0 0 0;color:rgba(255,255,255,.82);font-size:13px;line-height:1.45}
    /* Mobile friendliness: keep all top tabs/buttons visible */
    @media (max-width: 420px){
  .page{ padding: 12px; gap: 10px; }
  .topRow{ gap: 10px; align-items:flex-start; }
  .backBtn{ width:40px; height:40px; border-radius:12px; }
  .pageTopTitle{ font-size:16px; }
  .pageTopTitle.wrapTitleTabs{ gap: 8px; }
  .pageTopTitle.wrapTitleTabs > span:first-child{ width:100%; } /* title on its own line */
  .titleTabs{
    width:100%;
    overflow-x:auto;
    overflow-y:hidden;
    -webkit-overflow-scrolling: touch;
    white-space:nowrap;
    padding-bottom: 4px;
  }
  .titleTabs::-webkit-scrollbar{ display:none; }
  .tabPill{
    padding: 6px 10px;
    font-size: 11px;
    white-space: nowrap;
  }
}

  
/* Info titles around logo button */
.menuInfoTitle{
  width:260px;
  text-align:center;
  font-family: Manrope, system-ui, sans-serif;
  font-size:14px;
  font-weight:600;
  letter-spacing:.6px;
  color: rgba(255,255,255,.9);
  text-shadow: 0 6px 18px rgba(0,0,0,.35);
}
.topInfoTitle{
  margin-top:10px;
  margin-bottom:-6px;
}
.bottomInfoTitle{
  margin-top:-6px;
}


/* Clickable photos */
.clickablePhoto{ cursor:pointer; }


.articleWrap h2{font-size:22px;margin-bottom:10px;}
.articleWrap p{font-size:14px;line-height:1.6;margin-bottom:10px;}
.articleIntro{margin-bottom:14px;}
.articleRow{display:flex;gap:14px;margin-top:18px;align-items:center;}
.articleRow.reverse{flex-direction:row-reverse;}
.articleImg{width:45%;border-radius:16px;object-fit:cover;display:block;min-height:220px;background:rgba(255,255,255,.10);}
.articleText{width:55%;}
.articleText h3{margin:0 0 8px 0;font-size:16px;}
.articleMeta{margin-top:8px;}
@media(max-width:600px){
  .articleRow,.articleRow.reverse{flex-direction:column;}
  .articleImg,.articleText{width:100%;}
}

</style>

function renderAboutPage(){
  const p = PAGES.about;
  const kicker = p.title?.[currentLang] || p.title?.en || "ABOUT US";
  const name = p.subtitle?.[currentLang] || p.subtitle?.en || "G Boutique Hotel Kefalonia";
  const desc = p.desc?.[currentLang] || p.desc?.en || "";

  pageCard.innerHTML = `
    <div class="aboutWrap">
      <div class="aboutHero">
        <div class="kicker">${escapeHtml(kicker)}</div>
        <h2 class="name">${escapeHtml(name)}</h2>
        <p class="desc">${escapeHtml(desc).replaceAll("\\n","<br>")}</p>
      </div>
      <div class="aboutGrid" id="aboutGrid"></div>
    </div>
  `;

  const grid = pageCard.querySelector("#aboutGrid");

  ABOUT_CARDS.forEach((c, idx) => {
    const title = c.title?.[currentLang] || c.title?.en || "";
    const text  = c.text?.[currentLang]  || c.text?.en  || "";

    const card = document.createElement("div");
    card.className = "aboutCard";
    card.style.animationDelay = (idx * 110) + "ms";

    card.innerHTML = `
      <div class="aboutImg">
        <img src="${escapeHtml(c.img)}" alt="${escapeHtml(title)}" loading="lazy">
        <div class="label">${escapeHtml(title)}</div>
      </div>
      <div class="aboutBody">
        <p>${escapeHtml(text).replaceAll("\\n","<br>")}</p>
      </div>
    `;

    const img = card.querySelector("img");
    img.onerror = () => {
      img.remove();
      const box = card.querySelector(".aboutImg");
      box.style.display = "flex";
      box.style.alignItems = "center";
      box.style.justifyContent = "center";
      box.innerHTML = `<div style="padding:10px;text-align:center;color:rgba(255,255,255,.9);font-size:12px;">
        Βάλε φωτογραφία στο <b>${escapeHtml(c.img)}</b>
      </div>`;
    };

    grid.appendChild(card);
  });

  requestAnimationFrame(() => {
    pageCard.querySelectorAll(".aboutCard").forEach(el => el.classList.add("animate-in"));
  });
}


function renderTodoPage(){
  const p = PAGES.todo;
  const title = p.title?.[currentLang] || p.title?.en || "TO DO LIST";
  pageTopTitle.textContent = title;
  pageTopTitle.classList.remove("wrapTitleTabs");

  const items = Array.isArray(p.items) ? p.items : [];
  pageCard.innerHTML = `
    <h2 style="margin:0 0 8px 0;font-size:18px;font-weight:800;letter-spacing:.2px;">${escapeHtml(title)}</h2>
    <p style="margin:0;color:rgba(255,255,255,.82);line-height:1.6;font-size:14px;">${escapeHtml(p.text?.[currentLang] || p.text?.en || "")}</p>
    <div class="todoList" id="todoList"></div>
  `;
  const list = pageCard.querySelector("#todoList");

  const storeKey = "G Boutique Hotel Kefalonia_todo_checks_v1";
  const saved = JSON.parse(localStorage.getItem(storeKey) || "{}");

  items.forEach(it => {
    const row = document.createElement("label");
    row.className = "todoRow";
    row.htmlFor = "todo_" + it.id;
    row.innerHTML = `
      <input type="checkbox" id="todo_${escapeHtml(it.id)}">
      <div>
        <b>${escapeHtml(it.title || "")}</b>
        <p>${escapeHtml(it.desc || "")}</p>
      </div>
    `;
    const cb = row.querySelector("input");
    cb.checked = !!saved[it.id];
    cb.addEventListener("change", () => {
      saved[it.id] = cb.checked;
      localStorage.setItem(storeKey, JSON.stringify(saved));
    });
    list.appendChild(row);
  });
}

  pageTopTitle.classList.add("wrapTitleTabs");
  pageTopTitle.innerHTML = `
    <span style="font-weight:800;letter-spacing:.2px;">${escapeHtml(title)}</span>
    <span class="titleTabs" role="tablist" aria-label="Close to us sections">

      </div>

  const beachCards = (Array.isArray(CLOSE_BEACHES) ? CLOSE_BEACHES : []).map((it, idx) => `
    <div class="aboutCard animate-in" style="animation-delay:${idx*110}ms">
      <div class="aboutImg">
        <img src="${escapeHtml(it.img)}" alt="${escapeHtml(it.label)}" loading="lazy"
             onerror="this.style.display='none'; this.closest('.aboutImg').classList.add('noimg')">
        <div class="label">${escapeHtml(it.label)}</div>
      </div>
      <div class="aboutBody"><p>${escapeHtml(pickLang(it.desc))}</p></div>

        <div class="aboutGrid">${restCards}</div>

    <div id="closeTab_beaches" style="display:none">

function renderGenericPage(key){
  const p = PAGES[key];
  const title = p.title?.[currentLang] || p.title?.en || "Page";
  const text  = p.text?.[currentLang]  || p.text?.en  || "";

  const textHtml = escapeHtml(text).replaceAll("\n","<br>");

  const photos = Array.isArray(p.photos) ? p.photos : [];
  const isObjGallery = photos.length > 0 && typeof photos[0] === "object" && photos[0] && ("img" in photos[0]);

  const isRegionPage = (key === "lixouri" || key === "argostoli" || key === "kefalonia");

  if(isRegionPage){
    // Region pages: content panels only (tabs are in the top bar)
    pageCard.innerHTML = `
      <div id="regionTab_sightseens">${regionSightseensHTML(key)}</div>
      <div id="regionTab_restaurants" style="display:none">${regionRestaurantsHTML(key)}</div>
      <div id="regionTab_otherbeaches" style="display:none">${regionOtherBeachesHTML()}</div>

      ${((p.beaches && p.beaches.length) ? `
        <div id="regionTab_beaches" style="display:none">
          <div class="aboutWrap">
            <div class="aboutHero">
              <h2 class="name" style="margin-top:0;">${escapeHtml(key==="lixouri"?t("tabBeachesInLixouri"):(key==="argostoli"?t("tabBeachesNearArgostoli"):t("tabBeaches")))}</h2>
            </div>
            <div class="aboutGrid" id="beachGrid"></div>
          </div>
        </div>
      ` : ``)}
    `;

    // Render Beaches gallery (p.beaches) into Beaches tab if present
    const hasBeaches = !!(p && p.beaches && p.beaches.length);
    if(hasBeaches){
      const grid = pageCard.querySelector("#beachGrid");
      if(grid){
        p.beaches.forEach((item, idx) => {
          const card = document.createElement("div");
          card.className = "aboutCard";
          card.style.animationDelay = (idx * 110) + "ms";

          const cTitle = item.title || "";
          const cText  = item.text  || "";
          const cImg   = item.img   || "";

          card.innerHTML = `
            <div class="aboutImg">
              <img src="${escapeHtml(cImg)}" alt="${escapeHtml(cTitle)}" loading="lazy">
              <div class="label">${escapeHtml(cTitle)}</div>
            </div>
            <div class="aboutBody"><p>${escapeHtml(cText)}</p></div>
          `;

          grid.appendChild(card);
        });

        requestAnimationFrame(() => {
          pageCard.querySelectorAll(".aboutCard").forEach(el => el.classList.add("animate-in"));
        });
      }
    }

    return;
  }

  // If photos is an array of objects {title, text, img}, render as cards (like the screenshot style)
  if(isObjGallery){
    pageCard.innerHTML = `
      <div class="aboutWrap">
        <div class="aboutHero">
          <h2 class="name" style="margin-top:0;">${escapeHtml(text || title)}</h2>
        </div>
        <div class="aboutGrid" id="objGrid"></div>
      </div>
    `;

    const grid = pageCard.querySelector("#objGrid");
    if(!grid){
      console.warn("objGrid not found. Skipping object-gallery render.");
      return;
    }
    photos.forEach((item, idx) => {
      const card = document.createElement("div");
      card.className = "aboutCard";
      card.style.animationDelay = (idx * 110) + "ms";
      const cTitle = item.title || "";
      const cText  = item.text  || "";
      const cImg   = item.img   || "";
      const isArticle = !!item.isArticle;
      const goPage = item.go || "";
      const externalLink = item.link || "";

      if(isArticle){
        card.style.gridColumn = "1 / -1";
        card.innerHTML = `
          <div class="aboutImg" style="display:none;">
            <img src="${escapeHtml(cImg)}" alt="${escapeHtml(cTitle)}" loading="lazy">
            <div class="label">${escapeHtml(cTitle)}</div>
          </div>
          <div class="aboutBody">
            ${cText}
          </div>
        `;
      } else {
        card.innerHTML = `
          <div class="aboutImg">
            <img src="${escapeHtml(cImg)}" alt="${escapeHtml(cTitle)}" loading="lazy">
            <div class="label">${escapeHtml(cTitle)}</div>
          </div>
          <div class="aboutBody">
            <p>${escapeHtml(cText)}</p>
          </div>
        `;
        if(externalLink){
          card.classList.add("clickablePhoto");
          card.addEventListener("click", () => window.open(externalLink, "_blank", "noopener,noreferrer"));
        } else if(goPage){
          card.classList.add("clickablePhoto");
          card.addEventListener("click", () => renderPage(goPage));
        }
      }

      const img = card.querySelector("img");
      if(img){
        img.onerror = () => {
          const box = card.querySelector(".aboutImg");
          if(!box || box.style.display === "none") return;
          img.remove();
          box.style.display = "flex";
          box.style.alignItems = "center";
          box.style.justifyContent = "center";
          box.innerHTML = `<div style="padding:10px;text-align:center;color:rgba(255,255,255,.9);font-size:12px;">
            Βάλε φωτογραφία στο <b>${escapeHtml(cImg)}</b>
          </div>`;
        };
      }

      grid.appendChild(card);
    });

    requestAnimationFrame(() => {
      pageCard.querySelectorAll(".aboutCard").forEach(el => el.classList.add("animate-in"));
    });

    return;
  }

  // Default simple text + image gallery (array of strings)
  pageCard.innerHTML = `
    <h2 style="margin:0 0 8px 0;font-size:18px;font-weight:800;letter-spacing:.2px;">${escapeHtml(title)}</h2>
    <p style="margin:0;color:rgba(255,255,255,.82);line-height:1.6;font-size:14px;">${textHtml}</p>
    <div class="gallery" id="gallery"></div>
  `;

  const gallery = pageCard.querySelector("#gallery");

  if(photos.length === 0){
    const ph = document.createElement("div");
    ph.className = "photo";
    ph.style.gridColumn = "1 / -1";
    ph.textContent = I18N[currentLang]?.pageMissingPhotos || I18N.en.pageMissingPhotos;
    gallery.appendChild(ph);
  } else {
    photos.forEach(src => {
      const wrap = document.createElement("div");
      wrap.className = "photo";
      const img = document.createElement("img");
      img.src = src;
      img.alt = title;
      img.loading = "lazy";
      img.onerror = () => { wrap.textContent = src; };
      wrap.appendChild(img);
      gallery.appendChild(wrap);
    });
  }
}

function renderPage(key){
  currentPageKey = key;
  const p = PAGES[key];
  if(!p) return;

  const title = p.title?.[currentLang] || p.title?.en || "Page";

  // Tabs on top for specific pages (Lixouri / Argostoli / Kefalonia)
  const needsTopTabs = (key === "lixouri" || key === "argostoli" || key === "kefalonia");

  pageTopTitle.classList.toggle("wrapTitleTabs", needsTopTabs);

  if(needsTopTabs){
    pageTopTitle.innerHTML = `
      <span style="font-weight:800;letter-spacing:.2px;">${escapeHtml(title)}</span>
      <span class="titleTabs" role="tablist" aria-label="Sections">
        <button class="tabPill active" role="tab" data-local-tab="sightseens">${escapeHtml(t("tabSightseens"))}</button>
        <button class="tabPill" role="tab" data-local-tab="restaurants">${escapeHtml(t("tabRestaurants"))}</button>
        ${key === "lixouri" ? `<button class="tabPill" role="tab" data-local-tab="beaches">${escapeHtml(t("tabBeachesInLixouri"))}</button>` : ``}
        ${key === "argostoli" ? `<button class="tabPill" role="tab" data-local-tab="beaches">${escapeHtml(t("tabBeachesNearArgostoli"))}</button>` : ``}
        ${key === "kefalonia" ? `<button class="tabPill" role="tab" data-local-tab="otherbeaches">${escapeHtml(t("tabOtherBeaches"))}</button>` : ``}
        ${((key !== "lixouri" && key !== "argostoli" && PAGES[key] && PAGES[key].beaches && PAGES[key].beaches.length) ? `<button class="tabPill" role="tab" data-local-tab="beaches">${escapeHtml(t("tabBeaches"))}</button>` : ``)}
      </span>
    `;
  } else {
    pageTopTitle.textContent = title;
  }

  if(key === "about") renderAboutPage();
  else if(key === "close") renderClosePage();
  else if(key === "todo") renderTodoPage();
  else renderGenericPage(key);
}

function openPage(key){
  renderPage(key);
  show("page");
}

/* ====== Asset robustness (no broken images) ======
   This app can run as a single standalone HTML file.
   If an image in assets/ is missing, we replace it with a clean inline placeholder.
*/
const __PLACEHOLDER_SVG = (labelText="Image") => {
  const safe = String(labelText || "Image").slice(0, 40).replace(/[<>&"]/g, "");
  const svg = `
    <svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
      <defs>
        <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#ffffff" stop-opacity="0.28"/>
          <stop offset="1" stop-color="#000000" stop-opacity="0.10"/>
        </linearGradient>
      </defs>
      <rect width="1200" height="700" rx="42" fill="url(#g)"/>
      <rect x="40" y="40" width="1120" height="620" rx="34" fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="6"/>
      <g fill="#ffffff" fill-opacity="0.88" font-family="Manrope, system-ui, sans-serif" text-anchor="middle">
        <text x="600" y="340" font-size="46" font-weight="800">${safe}</text>
        <text x="600" y="395" font-size="24" font-weight="600" fill-opacity="0.75">Add the correct file in assets/ to replace this</text>
      </g>
    </svg>
  `.trim();
  return "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg);
};

// Replace broken <img> sources everywhere (captures early too)

document.addEventListener("error", (ev) => {
  const el = ev.target;
  if(!(el instanceof HTMLImageElement)) return;

  // If we have a dedicated fallback (e.g., prefer PNG when available, else inline SVG), use it first.
  const fb = el.getAttribute("data-fallback-src");
  if(fb && el.getAttribute("src") !== fb){
    el.dataset.fallbackApplied = "1";
    el.setAttribute("src", fb);
    return;
  }

  if(el.dataset.fallbackApplied === "1") return;
  el.dataset.fallbackApplied = "1";

  const alt = el.getAttribute("alt") || __basenameFromSrc(el.getAttribute("src") || "") || "Image missing";
  el.classList.remove("clickablePhoto");
  el.removeAttribute("role");
  el.removeAttribute("tabindex");
  el.setAttribute("src", __PLACEHOLDER_SVG(alt));
}, true);

/* Make any image whose filename exists in PHOTO_LINKS clickable */
function __basenameFromSrc(src){
  try {
    const clean = String(src || "").split("#")[0].split("?")[0];
    return clean.substring(clean.lastIndexOf("/") + 1);
  } catch(e) { return ""; }
}

function __getCurrentState(){
  const activeScreen = Object.entries(screens).find(([k,el]) => el.classList.contains("active"))?.[0] || "splash";
  const state = {
    screen: activeScreen,
    pageKey: (activeScreen === "page" ? (window.currentPageKey || null) : null),
    localTab: null,
    cardScrollTop: null
  };
  if(activeScreen === "page") {
    const activeTab = pageCard?.querySelector?.(".tabPill.active");
    if(activeTab) state.localTab = activeTab.dataset.localTab || null;
    if(pageCard) state.cardScrollTop = pageCard.scrollTop || 0;
  }
  return state;
}

function __persistState(state){
  try { localStorage.setItem("G Boutique Hotel Kefalonia_state_v1", JSON.stringify(state)); } catch(e) {
    try { sessionStorage.setItem("G Boutique Hotel Kefalonia_state_v1", JSON.stringify(state)); } catch(e2) {}
  }
}

function __restoreState(){
  // Restore last screen safely. If the saved state is invalid/corrupted, ignore it.
  const validate = (state) => {
    if(!state || typeof state !== "object") return null;
    const allowed = new Set(["splash","welcome","menu","page"]);
    if(!allowed.has(state.screen)) return null;
    if(state.screen === "page"){
      if(!state.pageKey || !PAGES || !PAGES[state.pageKey]) return null;
    }
    return state;
  };

  try {
    const raw = localStorage.getItem("G Boutique Hotel Kefalonia_state_v1");
    if(raw) return validate(JSON.parse(raw));
  } catch(e) {}
  try {
    const raw2 = sessionStorage.getItem("G Boutique Hotel Kefalonia_state_v1");
    return raw2 ? validate(JSON.parse(raw2)) : null;
  } catch(e2) { return null; }
}

function __applyState(state){
  if(!state || !state.screen) return;
  if(state.screen === "page" && state.pageKey) {
    // render correct page then show it
    renderPage(state.pageKey);
    show("page");
    // restore local tab if exists
    if(state.localTab) {
      const btn = pageTopTitle?.querySelector?.(`[data-local-tab="${state.localTab}"]`);
      if(btn) btn.click();
    }
    // restore scroll
    if(typeof state.cardScrollTop === "number") {
      requestAnimationFrame(() => { if(pageCard) pageCard.scrollTop = state.cardScrollTop; });
    }
  } else {
    show(state.screen);
  }
}

function __attachPhotoLinks(root){
  if(!root) return;
  const imgs = root.querySelectorAll("img");
  imgs.forEach(img => {
    const fname = __basenameFromSrc(img.getAttribute("src") || img.src || "");
    const href = PHOTO_LINKS[fname];
    if(!href) return;

    if(img.dataset.linked === "1") return;
    img.dataset.linked = "1";
    img.classList.add("clickablePhoto");
    img.setAttribute("role","link");
    img.setAttribute("tabindex","0");
    img.setAttribute("aria-label", (img.getAttribute("alt") || fname) + " (open link)");

    const go = (ev) => {
      try { ev?.stopPropagation?.(); ev?.preventDefault?.(); } catch(e) {}
      __persistState(__getCurrentState());
      // open in same tab so user can press browser back; state is restored from sessionStorage
      window.location.href = href;
    };
    img.addEventListener("click", go);
    img.addEventListener("keydown", (e) => {
      if(e.key === "Enter" || e.key === " ") go(e);
    });
  });
}

/* Patch renderPage to attach links after every render */
const __orig_renderPage = renderPage;
renderPage = function(key){
  __orig_renderPage(key);
  // attach links after DOM updates
  requestAnimationFrame(() => __attachPhotoLinks(pageCard));
};

/* Patch show() to keep browser history + persist state */
const __orig_show = show;
let __suppressHistory = false;

show = function(screenId){
  __orig_show(screenId);

  if(__suppressHistory) return;
  const state = __getCurrentState();
  __persistState(state);

  // push/replace history state so browser back works inside the app too
  const urlHash = (state.screen === "page" && state.pageKey) ? ("#/" + encodeURIComponent(state.pageKey)) : ("#/" + encodeURIComponent(state.screen));
  try {
    // avoid pushing duplicates
    const cur = history.state;
    const same = cur && JSON.stringify(cur) === JSON.stringify(state);
    if(!same) history.pushState(state, "", urlHash);
  } catch(e) {}
};

/* Ensure initial history state + restore last view (after coming back from external site) */
(function __historyInit(){
  const restored = __restoreState();
  if(restored) {
    // don't double-push when applying restored state
    __suppressHistory = true;
    __applyState(restored);
    __suppressHistory = false;
    try { history.replaceState(__getCurrentState(), "", location.hash || "#/"); } catch(e) {}
  } else {
    try { history.replaceState({screen:"welcome"}, "", "#/welcome"); } catch(e) {}
  }

  // react to browser back/forward
  window.addEventListener("popstate", (e) => {
    const state = e.state || __restoreState();
    __suppressHistory = true;
    if(state) __applyState(state);
    else show("welcome");
    __suppressHistory = false;
  });


  // On iOS/Safari, sessionStorage can be cleared when navigating to another site.
  // pageshow fires when returning via Back (including bfcache). Re-apply the last saved state.
  let __didPageShowRestore = false;
  window.addEventListener("pageshow", () => {
    if(__didPageShowRestore) return;
    const st = __restoreState();
    if(st){
      __suppressHistory = true;
      __applyState(st);
      __suppressHistory = false;
      __didPageShowRestore = true;
    }
  });

  // Save state when page is being hidden (navigation away / app background)
  document.addEventListener("visibilitychange", () => {
    if(document.hidden){
      __persistState(__getCurrentState());
    }
  });

  // also attach links on first render (splash/home)
  requestAnimationFrame(() => __attachPhotoLinks(document));
})();



document.addEventListener("DOMContentLoaded", () => {
  if(!location.hash || location.hash === "#/" || location.hash === "#"){
    location.hash = "#/welcome";
  }
});
